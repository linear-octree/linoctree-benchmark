name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >
            build-essential pkg-config cmake git wget unzip python3 ca-certificates
            libboost-all-dev libeigen3-dev libomp-dev libyaml-cpp-dev
            libqhull-dev libusb-1.0-0-dev liblz4-dev libgl-dev libpng-dev

      - name: Cache linear-octree install
        uses: actions/cache@v3
        with:
          path: ~/.local
          key: ${{ runner.os }}-linoctree-${{ hashFiles('scripts/install_laslib.sh') }}
          restore-keys: |
            ${{ runner.os }}-linoctree-

      - name: Install linear-octree library
        run: |
          git clone --depth=1 https://github.com/linear-octree/linear-octree.git /tmp/linear-octree
          cd /tmp/linear-octree
          bash scripts/install_laslib.sh
          cmake -B build -DCMAKE_BUILD_TYPE=Release .
          cmake --build build --parallel $(nproc)
          cmake --install build

      - name: Cache benchmark dependencies (lib/)
        uses: actions/cache@v3
        with:
          path: lib
          key: ${{ runner.os }}-benchlib-${{ hashFiles('scripts/install_laslib.sh', 'scripts/install_papi.sh', 'scripts/install_picotree.sh', 'scripts/install_pcl.sh') }}
          restore-keys: |
            ${{ runner.os }}-benchlib-

      - name: Create lib directory
        run: mkdir -p lib

      - name: Install LASlib
        run: bash scripts/install_laslib.sh

      - name: Install PAPI
        run: bash scripts/install_papi.sh

      - name: Install Picotree
        run: bash scripts/install_picotree.sh

      - name: Install PCL
        run: bash scripts/install_pcl.sh

      - name: Cache CMake build
        uses: actions/cache@v3
        with:
          path: build
          key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            ${{ runner.os }}-cmake-

      - name: Configure CMake
        run: cmake -B build -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release .

      - name: Build project
        run: cmake --build build --parallel $(nproc)

      - name: Run tests
        run: ctest --test-dir build/tests --output-on-failure
