name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            runner: ubuntu-22.04
          - os: ubuntu-24.04
            runner: ubuntu-24.04
          - os: arch
            runner: ubuntu-latest
            container: archlinux:latest
      fail-fast: false

    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}

    steps:
      - name: Install git (Arch)
        if: matrix.os == 'arch'
        run: pacman -Sy --noconfirm git

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache apt packages
        if: matrix.os != 'arch'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >
            build-essential pkg-config cmake git wget unzip python3 ca-certificates
            libboost-all-dev libeigen3-dev libomp-dev libyaml-cpp-dev
            libqhull-dev libusb-1.0-0-dev liblz4-dev libgl-dev libpng-dev

      - name: Install packages (Arch)
        if: matrix.os == 'arch'
        run: |
          pacman -Syu --noconfirm \
            base-devel pkgconf cmake wget unzip python ca-certificates \
            eigen yaml-cpp qhull libusb lz4 mesa libpng

      - name: Cache linear-octree install
        id: cache-linoctree
        uses: actions/cache@v3
        with:
          path: ~/.local
          key: ${{ matrix.os }}-linoctree-${{ hashFiles('scripts/install_laslib.sh') }}

      - name: Install linear-octree library
        if: steps.cache-linoctree.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://github.com/linear-octree/linear-octree.git /tmp/linear-octree
          cd /tmp/linear-octree
          bash scripts/install_laslib.sh
          cmake -B build -DCMAKE_BUILD_TYPE=Release .
          cmake --build build --parallel $(nproc)
          cmake --install build

      - name: Cache benchmark dependencies (lib/)
        id: cache-benchlib
        uses: actions/cache@v3
        with:
          path: lib
          key: ${{ matrix.os }}-benchlib-${{ hashFiles('scripts/install_laslib.sh', 'scripts/install_papi.sh', 'scripts/install_picotree.sh', 'scripts/install_pcl.sh') }}

      - name: Create lib directory
        run: mkdir -p lib

      - name: Install LASlib
        if: steps.cache-benchlib.outputs.cache-hit != 'true'
        run: bash scripts/install_laslib.sh

      - name: Install PAPI
        if: steps.cache-benchlib.outputs.cache-hit != 'true'
        run: bash scripts/install_papi.sh

      - name: Install Picotree
        if: steps.cache-benchlib.outputs.cache-hit != 'true'
        run: bash scripts/install_picotree.sh

      - name: Install PCL
        if: steps.cache-benchlib.outputs.cache-hit != 'true'
        run: bash scripts/install_pcl.sh

      - name: Cache CMake build
        uses: actions/cache@v3
        with:
          path: build
          key: ${{ matrix.os }}-cmake-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            ${{ matrix.os }}-cmake-

      - name: Configure CMake
        run: cmake -B build -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release .

      - name: Build project
        run: cmake --build build --parallel $(nproc)

      - name: Run tests
        run: ctest --test-dir build/tests --output-on-failure
